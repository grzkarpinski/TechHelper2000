services:
  tech-helper-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: tech-helper-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8000"
      DATABASE_URL: sqlite+aiosqlite:////app/backend/data/machining.db
      ALLOWED_ORIGINS: ${DOCKER_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    volumes:
      - ./backend/data:/app/backend/data
    expose:
      - "8000"
    mem_limit: 250m
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 30s
      timeout: 5s
      retries: 5

  tech-helper-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
      args:
        VITE_API_URL: ""
    container_name: tech-helper-frontend
    depends_on:
      tech-helper-backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    mem_limit: 250m